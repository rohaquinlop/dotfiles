general {
    lock_cmd = omarchy-idle-lock
    before_sleep_cmd = OMARCHY_LOCK_ONLY=true omarchy-idle-lock
    after_sleep_cmd = sleep 1 && omarchy-system-wake
    inhibit_sleep = 3
}

listener {
    timeout = 300
    on-timeout = pidof hyprlock || omarchy-launch-screensaver
}

listener {
    timeout = 900
    on-timeout = omarchy-idle-lock
    on-resume = omarchy-system-wake
}
