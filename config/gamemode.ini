[general]
; Renice game processes for higher priority
renice = 5

; Apply IO scheduling priority
ioprio = 0

; Inhibit screensaver while gaming
inhibit_screensaver = 1

[filter]
;

[cpu]
; Set CPU governor to performance mode while gaming
gov = performance

; Apply IO rules to game process and children
apply_iorules = 1

[gpu]
; Disabled — X1 Carbon thin chassis can't sustain max GPU clocks
; Forcing max freq causes thermal throttling, which makes things worse
apply_gpu_optimisations = 0

[supervisor]
;

[custom]
;
