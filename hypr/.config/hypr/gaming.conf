# Gaming performance window rules
# These exempt games from compositor effects that cost GPU cycles

# Steam games (most games launched from Steam)
windowrule {
  name = gaming-steam-apps
  match:class = steam_app.*
  opacity = 1 1
  tag = -default-opacity
}

# Steam client itself
windowrule {
  name = gaming-steam-client
  match:class = steam
  opacity = 1 1
  tag = -default-opacity
}

# Lutris / Wine games
windowrule {
  name = gaming-lutris
  match:class = lutris
  opacity = 1 1
}

# RetroArch
windowrule {
  name = gaming-retroarch
  match:class = com.libretro.RetroArch
  opacity = 1 1
}

# Moonlight
windowrule {
  name = gaming-moonlight
  match:class = com.moonlight_stream.Moonlight
  opacity = 1 1
}

# Minecraft
windowrule {
  name = gaming-minecraft
  match:class = Minecraft.*
  opacity = 1 1
}
